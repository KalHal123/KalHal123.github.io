<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Color Extractor</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <h1>Color Extractor</h1>
        <div id="drop-area">
            <form class="my-form">
                <p>Drag and drop an image here or click to select a file</p>
                <input type="file" id="fileElem" accept="image/*" onchange="handleFiles(this.files)">
            </form>
        </div>
        <label for="numColors">Number of top colors (3 to 10):</label>
        <input type="number" id="numColors" name="numColors" min="3" max="10" value="3">
        <button onclick="uploadImage()">Extract Colors</button>
        <div id="colors"></div>
    </div>
    <script src="script.js"></script>
</body>
</html>
