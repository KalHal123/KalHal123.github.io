<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dynamic Video Showcase</title>
    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #f2f2f2, #e0e0e0);
            color: #333;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        h1 {
            margin-bottom: 30px;
            font-size: 2.5em;
            color: #007bff;
            text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.2);
        }

        .video-container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 20px;
        }

        .video-item {
            background: #fff;
            border-radius: 12px;
            box-shadow: 0 8px 16px rgba(0, 0, 0, 0.2);
            overflow: hidden;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            width: 300px;
            height: 200px;
        }

        .video-item:hover {
            transform: translateY(-5px);
            box-shadow: 0 12px 24px rgba(0, 0, 0, 0.3);
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
    </style>
</head>
<body>
    <h1>Dynamic Video Showcase</h1>
    <div class="video-container" id="videoContainer">
        <!-- Videos will be dynamically inserted here -->
    </div>

    <script>
        const apiKey = 'AIzaSyDJwwwQYy-EtnU96eHVAsaxskTE-QU_2PU';
        const videoContainer = document.getElementById('videoContainer');

        async function fetchPopularVideos() {
            const response = await fetch(`https://www.googleapis.com/youtube/v3/search?part=snippet&maxResults=10&chart=mostPopular&type=video&key=${apiKey}`);
            const data = await response.json();
            return data.items;
        }

        function createVideoElement(videoId) {
            const videoItem = document.createElement('div');
            videoItem.classList.add('video-item');
            videoItem.innerHTML = `
                <iframe src="https://www.youtube.com/embed/${videoId}" allowfullscreen></iframe>
            `;
            return videoItem;
        }

        async function loadVideos() {
            const videos = await fetchPopularVideos();
            videos.forEach(video => {
                const videoElement = createVideoElement(video.id.videoId);
                videoContainer.appendChild(videoElement);
            });
        }

        loadVideos();
    </script>
</body>
</html>
