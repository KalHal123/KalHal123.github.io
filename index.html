<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Endless Video Showcase</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #f0f0f0;
            color: #333;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 0;
            overflow-x: hidden;
        }

        .container {
            max-width: 1200px;
            width: 100%;
            padding: 20px;
        }

        .video-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
            justify-content: center;
        }

        .video {
            background: #fff;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
            transition: transform 0.3s ease;
        }

        .video:hover {
            transform: scale(1.02);
        }

        iframe {
            width: 100%;
            height: 200px;
            border: 0;
        }

        .video-title {
            padding: 10px;
            font-size: 1.1em;
            color: #333;
        }

        .loading {
            margin: 20px;
            font-size: 1.5em;
            color: #007bff;
        }

        .button-container {
            margin-top: 20px;
            padding: 10px;
            text-align: center;
        }

        .link-button {
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            background: #007bff;
            color: #fff;
            font-size: 1.2em;
            cursor: pointer;
            text-decoration: none;
            transition: all 0.3s ease;
        }

        .link-button:hover {
            background: #0056b3;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Endless Video Showcase</h1>
        <div id="videoGrid" class="video-grid">
            <!-- Videos will be dynamically added here -->
        </div>
        <div id="loading" class="loading">Loading more videos...</div>
        <div class="button-container">
            <a href="index.html" class="link-button">Back to Main Page</a>
        </div>
    </div>

    <script>
        const videoGrid = document.getElementById('videoGrid');
        const loading = document.getElementById('loading');
        let pageToken = ''; // Initialize pageToken for pagination
        let loadingMore = false;
        const apiKey = 'AIzaSyDJwwwQYy-EtnU96eHVAsaxskTE-QU_2PU'; // Your API key

        async function fetchVideos() {
            if (loadingMore) return;
            loadingMore = true;
            loading.style.display = 'block';

            try {
                const response = await fetch(`https://www.googleapis.com/youtube/v3/videos?part=snippet,contentDetails,statistics&chart=mostPopular&regionCode=US&key=${apiKey}&pageToken=${pageToken}`);
                const data = await response.json();
                
                // Check if there's a next page token
                pageToken = data.nextPageToken || '';
                
                // Process the videos
                data.items.forEach(video => {
                    const videoId = video.id;
                    const title = video.snippet.title;
                    const videoHTML = `
                        <div class="video">
                            <iframe src="https://www.youtube.com/embed/${videoId}" allowfullscreen></iframe>
                            <div class="video-title">${title}</div>
                        </div>
                    `;
                    videoGrid.innerHTML += videoHTML;
                });

                // Hide the loading indicator
                loading.style.display = 'none';
            } catch (error) {
                console.error('Error fetching videos:', error);
                loading.style.display = 'none';
            } finally {
                loadingMore = false;
            }
        }

        function handleScroll() {
            if (window.innerHeight + window.scrollY >= document.body.offsetHeight - 100) {
                fetchVideos();
            }
        }

        window.addEventListener('scroll', handleScroll);

        // Initial load
        fetchVideos();
    </script>
</body>
</html>
