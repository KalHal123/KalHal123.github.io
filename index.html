<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Main Page</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #f0f0f0;
            color: #333;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            padding: 0;
        }

        .container {
            text-align: center;
            padding: 20px;
            background: #fff;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
            max-width: 500px;
            width: 100%;
        }

        h1 {
            margin-bottom: 20px;
            font-size: 2em;
            color: #007bff;
        }

        .link-button {
            padding: 15px 25px;
            border: none;
            border-radius: 5px;
            background: #007bff;
            color: #fff;
            font-size: 1.5em;
            cursor: pointer;
            text-decoration: none;
            transition: all 0.3s ease;
            display: inline-block;
        }

        .link-button:hover {
            background: #0056b3;
        }

        .input-container {
            margin-top: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        input[type="text"] {
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 5px;
            font-size: 1em;
            width: 100%;
            max-width: 300px;
        }

        input[type="submit"] {
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            background: #28a745;
            color: #fff;
            font-size: 1em;
            cursor: pointer;
            margin-top: 10px;
            transition: all 0.3s ease;
        }

        input[type="submit"]:hover {
            background: #218838;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Welcome to My Website</h1>
        <div class="input-container">
            <form id="nameForm">
                <input type="text" id="nameInput" placeholder="Enter your name" required>
                <input type="submit" value="Submit">
            </form>
            <p id="greetingMessage" style="margin-top: 20px; font-size: 1.2em;"></p>
        </div>
        <a href="index2.html" class="link-button">Go to Video Showcase</a>
    </div>

    <script>
        document.getElementById('nameForm').addEventListener('submit', function(event) {
            event.preventDefault();
            const name = document.getElementById('nameInput').value;
            const message = `Hello, ${name}! Welcome to the website.`;
            const greetingMessage = document.getElementById('greetingMessage');
            greetingMessage.textContent = message;
            
            setTimeout(() => {
                greetingMessage.textContent = '';
            }, 3000); // Clear message after 3 seconds
        });
    </script>
</body>
</html>
