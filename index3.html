<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Styled Buttons</title>
    <style>
        /* Basic Button Styles */
        .button {
            padding: 100px 200px;
            border: none;
            border-radius: 5px;
            background-color: #007bff;
            color: #fff;
            font-size: 16px;
            cursor: pointer;
            transition: background-color 0.3s ease, transform 0.2s ease;
            text-align: center;
            text-decoration: none;
            display: inline-block;
        }

        .button:hover {
            background-color: #0056b3;
            transform: scale(1.05);
        }

        .button:active {
            background-color: #003d80;
            transform: scale(0.95);
        }
    </style>
</head>
<body>
    <!-- Button using <button> element -->
    <button class="button" type="button">Button Element</button>

    <!-- Button using <input> element -->
    <input type="button" class="button" value="Input Element">
</body>
</html>
